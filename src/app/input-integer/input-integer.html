<div class="quantity-container">

        <button class="btn-quantity btn-minus" (click)="downQuantity()">
                -
        </button>

        <input class="inputQuantity" type="text" [(ngModel)]="quantity" (keyup)="changeQuantity($event )">

        <button class="btn-quantity btn-plus" (click)="upQuantity()">
                +
        </button>

</div>
