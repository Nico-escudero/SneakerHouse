<h1>Lista de sneakers</h1>


<div class="row">

    <div class="col-8 border-end">
        <div class="d-flex flex-wrap gap-3">


            @for (sneaker of sneakers; track sneaker.id) {

            <div class="card-sneaker">

                <div class="img-wrapper" [ngClass]="{'out-stock-wrapper': sneaker.stock == 0}">

                    <img class="img-sneaker" loading="lazy" [src]="sneaker.image" [alt]="sneaker.name">

                </div>

                <div class="sneaker-name">
                    {{ sneaker.name }}
                </div>

                <div class="price-container">

                    @if (sneaker.clearance) {
                    <span class="sale-badge">
                        OFERTA
                    </span>
                    }

                    <div [ngClass]="{'clearance': sneaker.clearance}">
                        {{ sneaker.price | currency }}
                    </div>

                </div>
                @if (sneaker.stock === 0) {
                <span class="out-stock">
                    SIN STOCK
                </span>
                }

                <button class="btn-detail" [routerLink]="['/sneakers', sneaker.id]">

                    Ver detalle

                    <svg xmlns="http://www.w3.org/2000/svg" height="18" width="18" viewBox="0 -960 960 960"
                        fill="currentColor">

                        <path d="m321-80-71-71 329-329-329-329 71-71 400 400-400 400Z" />

                    </svg>

                </button>



            </div>

            } @empty {

            <div>
                No hay zapatillas disponibles.
            </div>

            }

        </div>
    </div>

    <div class="col-4 ps-4">
        <app-cart></app-cart>
    </div>

</div>
