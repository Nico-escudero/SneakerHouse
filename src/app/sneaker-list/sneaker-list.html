<table class="table">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let sneaker of sneakers" [ngClass]="{'clearance':sneaker.clearance}">
            <td><img class=" img-sneaker" [src]="sneaker.image" [alt]="sneaker.name">
            </td>
            <td>{{ sneaker.name }}</td>
            <td>{{ sneaker.type }}</td>
            <td>{{ sneaker.price | currency }}</td>
            <td> <span class="badge text-bg-warning" *ngIf="sneaker.stock==0">SIN STOCK</span></td>
        </tr>
    </tbody>
</table>
